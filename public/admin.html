<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>iContábil IA — Painel</title>
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .admin-wrap { max-width: 980px; margin: 0 auto; padding: 1.5rem; }
    .admin-topo { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem; }
    .admin-topo h1 { font-size: 1.4rem; margin: 0; color: #fff; }
    .admin-topo h1 b { color: var(--verde); text-shadow: var(--glow-verde); }
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: .9rem; }
    @media (max-width: 620px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
    .kpi { background: #0d0d16; border: 1px solid var(--borda); border-radius: 12px; padding: 1rem 1.1rem; }
    .kpi .v { font-size: 1.7rem; font-weight: 800; color: #fff; }
    .kpi .v.verde { color: var(--verde-claro); text-shadow: var(--glow-verde); }
    .kpi .l { font-size: .78rem; color: var(--texto-suave); text-transform: uppercase; letter-spacing: .04em; margin-top: .2rem; }
    .secao { margin-top: 1.5rem; }
    .secao h2 { font-size: 1rem; color: var(--roxo-claro); margin: 0 0 .6rem; }
    .barras { display: flex; flex-direction: column; gap: .5rem; }
    .barra { display: grid; grid-template-columns: 130px 1fr 48px; align-items: center; gap: .6rem; font-size: .85rem; color: var(--texto-suave); }
    .barra .trilho { background: #14141f; border-radius: 6px; height: 14px; overflow: hidden; border: 1px solid var(--borda); }
    .barra .fill { height: 100%; background: var(--grad-marca); }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th, td { text-align: left; padding: .55rem .5rem; border-bottom: 1px solid var(--borda); }
    th { color: var(--texto-suave); font-weight: 600; text-transform: uppercase; font-size: .7rem; letter-spacing: .04em; }
    td.rec-hibrido { color: var(--roxo-claro); } td.rec-puro { color: var(--verde-claro); }
    .tag-pago { color: var(--verde-claro); font-weight: 700; }
    .gate { max-width: 360px; margin: 4rem auto; text-align: center; }
    .gate input { width: 100%; }
    .mut { color: var(--texto-suave); font-size: .8rem; }
    .erro { color: var(--vermelho); }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div id="gate" class="gate" hidden>
      <h1><b>iContábil</b> · Painel</h1>
      <p class="mut">Informe o token de admin para acessar.</p>
      <label for="token">Token</label>
      <input id="token" type="password" placeholder="ADMIN_TOKEN" />
      <button class="btn primario" id="btn-entrar">Entrar</button>
      <p id="gate-erro" class="erro" hidden>Token inválido.</p>
    </div>

    <div id="painel" hidden>
      <div class="admin-topo">
        <h1><b>iContábil</b> · Painel de leads</h1>
        <div>
          <button class="btn" id="btn-atualizar">Atualizar</button>
          <button class="btn link" id="btn-sair">Sair</button>
        </div>
      </div>

      <div class="kpis" id="kpis"></div>

      <div class="secao">
        <h2>Recomendação</h2>
        <div class="barras" id="rec"></div>
      </div>
      <div class="secao">
        <h2>Por setor</h2>
        <div class="barras" id="setor"></div>
      </div>
      <div class="secao">
        <h2>Últimas simulações</h2>
        <table>
          <thead><tr><th>Data</th><th>CNPJ</th><th>Setor</th><th>Recomendação</th><th>Faturamento</th><th>Conta</th></tr></thead>
          <tbody id="leads"></tbody>
        </table>
      </div>
      <p class="disclaimer">Dados do próprio simulador. Apenas leitura.</p>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const KEY = 'icontabil_admin_token';
    const brl = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
    const brlC = (c) => (Number(c || 0) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const getTok = () => localStorage.getItem(KEY);

    async function api(url) {
      const r = await fetch(url, { headers: { 'X-Admin-Token': getTok() || '' } });
      if (r.status === 401 || r.status === 503) { sair(); throw new Error('auth'); }
      return r.json();
    }
    function sair() { localStorage.removeItem(KEY); mostraGate(); }
    function mostraGate() { $('#painel').hidden = true; $('#gate').hidden = false; }

    function rotuloRec(k) { return k === 'hibrido' ? 'Simples Híbrido' : k === 'puro' ? 'Simples Puro' : '(não identificado)'; }
    function barras(el, dados, rotulo) {
      const total = dados.reduce((s, d) => s + d.n, 0) || 1;
      el.innerHTML = dados.map((d) => {
        const pct = Math.round((d.n / total) * 100);
        return `<div class="barra"><span>${rotulo(d.chave)}</span><span class="trilho"><span class="fill" style="width:${pct}%"></span></span><span>${d.n}</span></div>`;
      }).join('') || '<p class="mut">Sem dados ainda.</p>';
    }

    async function carregar() {
      try {
        const s = await api('/api/admin/stats');
        $('#kpis').innerHTML = [
          ['Contas verificadas', s.contasVerificadas, ''],
          ['Simulações', s.simulacoes, ''],
          ['CNPJs únicos', s.cnpjsUnicos, ''],
          ['Conversões (pagas)', s.conversoes, 'verde'],
          ['Receita', brlC(s.receitaCentavos), 'verde'],
          ['Contas no plano pago', s.contasPagas, ''],
        ].map(([l, v, cls]) => `<div class="kpi"><div class="v ${cls}">${v}</div><div class="l">${l}</div></div>`).join('');
        barras($('#rec'), s.porRecomendacao, rotuloRec);
        barras($('#setor'), s.porSetor, (k) => k || '(não informado)');

        const { leads } = await api('/api/admin/leads?limite=50');
        $('#leads').innerHTML = leads.map((l) => {
          const dt = new Date(l.criado_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
          const cnpj = String(l.cnpj || '').replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
          const rec = rotuloRec(l.recomendacao);
          const fat = l.faturamento != null ? brl.format(l.faturamento) : '—';
          const conta = (l.contato || '') + (l.plano === 'pago' ? ' <span class="tag-pago">●</span>' : '');
          return `<tr><td>${dt}</td><td>${cnpj}</td><td>${l.setor || '—'}</td><td class="rec-${l.recomendacao || ''}">${rec}</td><td>${fat}</td><td>${conta}</td></tr>`;
        }).join('') || '<tr><td colspan="6" class="mut">Nenhuma simulação ainda.</td></tr>';

        $('#gate').hidden = true; $('#painel').hidden = false;
      } catch (e) { /* sair() já tratou auth */ }
    }

    $('#btn-entrar').addEventListener('click', () => {
      const t = $('#token').value.trim();
      if (!t) return;
      localStorage.setItem(KEY, t);
      $('#gate-erro').hidden = true;
      carregar();
    });
    $('#token').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#btn-entrar').click(); });
    $('#btn-atualizar').addEventListener('click', carregar);
    $('#btn-sair').addEventListener('click', sair);

    if (getTok()) carregar(); else mostraGate();
  </script>
</body>
</html>
